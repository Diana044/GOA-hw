<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            display: flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            height:100vh;
            background-color:rgba(231, 128, 231, 0.793);
            color: black;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }
        div{
            display: flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            width: 400px;
            height: 300px;
            border-radius:15px;
            background-color: rgb(109, 34, 163);
            gap: 10px;
            box-shadow: 0px 0px 30px rgb(93, 0, 95);
        }
        input{
            padding: 10px;
            border: red;
            border-radius: 10px;
            background-color: white;
            color: black;
        }
        button{
            border: none;
            border-radius: 10px;
            padding:10px 30px;
            background-color:rgb(250, 182, 240);
            cursor:pointer;
            border: white;
        }
        p{
            border: 1px solid white;;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow:0px 0px 40px white;
            background-color: rgb(255, 255, 255);
            width: 370px;
            height:80px;
            padding: 5px;
            border-radius: 10px;
            color: white;
            overflow: scroll;
        }
    </style>
</head>
<body>

    <div id="div">
        <input type="text" id="input" name="input" placeholder="entter your name">
        <button id="btn">submit</button>
        <p id="p">...</p>
    </div>





    <script src="hw.js"></script>
</body>
</html>
