<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: rgba(231, 128, 231, 0.793);
        color: rgb(186, 0, 0);
        font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      }
      button {
        border-radius: 10px;
        padding: 10px 30px;
        background-color: rgb(0, 0, 0);
        cursor: pointer;
        color:red;
        border-color: rgb(255, 0, 0);
        box-shadow: 0px 0px 12px rgb(237, 0, 0);
      }
      div{
        display: flex;
        margin: 10px;
        gap: 10px;
      }
    </style>
  </head>
  <body>

   <button id="toggle">Toggle Theme</button>
    

    <div>
      <p>dark</p>
      <button id="dark"></button>
    </div>

    <div>
      <p>light</p>
      <button id="light"></button>
    </div>

    <script src="hw2.js"></script>
  </body>
</html>
