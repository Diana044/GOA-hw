<html lang="en">
<head>

    <title>Document</title>
    <style>
              * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: rgba(0, 29, 28, 0.793);
        color: rgb(255, 255, 255);
        font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;

      button {
        border-radius: 10px;
        padding: 10px 30px;
        background-color: rgb(0, 0, 0);
        cursor: pointer;
        color:rgb(78, 129, 239);
        border-color: rgb(33, 0, 152);
        box-shadow: 0px 0px 12px rgb(103, 0, 237);
      }
      div{
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 10px;
        gap: 20px;
      }

</head>
<body>

    <div>
        <button id="decrease">-</button>
